name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check . --extra-search-path src --output-format concise

      - name: Tests with coverage gate
        run: uv run pytest --cov=src/dietary_guardian --cov=apps/api/dietary_api --cov-report=term-missing --cov-fail-under=35 -q

      - name: Readiness gate (prod profile)
        run: |
          APP_ENV=prod \
          LLM_PROVIDER=test \
          APP_DATA_BACKEND=sqlite \
          AUTH_STORE_BACKEND=in_memory \
          HOUSEHOLD_STORE_BACKEND=sqlite \
          EPHEMERAL_STATE_BACKEND=in_memory \
          uv run python -m apps.api.run >/tmp/api_readiness_ci.log 2>&1 &
          API_PID=$!
          cleanup() {
            kill "$API_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8001/api/v1/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          READINESS_FAIL_ON_WARNINGS=1 ./scripts/check-readiness.sh http://127.0.0.1:8001

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Web lint
        run: pnpm web:lint

      - name: Web typecheck
        run: pnpm web:typecheck

      - name: Web build
        run: pnpm web:build

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        run: uv sync --all-extras --dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      - name: Run web smoke e2e
        run: pnpm --dir apps/web test:e2e
