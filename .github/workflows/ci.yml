name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check src/care_pilot apps/api/carepilot_api --extra-search-path src --output-format concise

      - name: Tests with coverage gate
        run: uv run pytest --cov=src/care_pilot --cov=apps/api/carepilot_api --cov-report=term-missing --cov-fail-under=70 -q

      - name: Doc gardening report
        run: uv run python scripts/docs/doc_gardener.py

      - name: System Evaluation
        run: uv run python scripts/evaluation/eval_harness.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Web lint
        run: pnpm --dir apps/web lint

      - name: Web typecheck
        run: pnpm --dir apps/web typecheck

      - name: Web build
        run: pnpm --dir apps/web build

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        run: uv sync --all-extras --dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Build web app
        run: pnpm --dir apps/web build

      - name: Install Playwright browser
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      - name: Run web smoke e2e
        run: pnpm --dir apps/web test:e2e
