name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check . --extra-search-path src --output-format concise

      - name: Tests with coverage gate
        run: uv run pytest --cov=src/dietary_guardian --cov=apps/api/dietary_api --cov-report=term-missing --cov-fail-under=70 -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Web lint
        run: pnpm web:lint

      - name: Web typecheck
        run: pnpm web:typecheck

      - name: Web build
        run: pnpm web:build

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        run: uv sync --all-extras --dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      - name: Run web smoke e2e
        run: pnpm --dir apps/web test:e2e

  shared-topology:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dietary_guardian
          POSTGRES_USER: dietary_guardian
          POSTGRES_PASSWORD: dietary_guardian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dietary_guardian -d dietary_guardian"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Sync backend dependencies
        run: uv sync --all-extras --dev

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap postgres schema
        env:
          POSTGRES_DSN: postgresql://dietary_guardian:dietary_guardian@127.0.0.1:5432/dietary_guardian
        run: uv run python scripts/dg.py migrate postgres

      - name: Build web production bundle
        run: pnpm web:build

      - name: Shared-topology smoke
        env:
          DG_SMOKE_SKIP_INFRA_BOOTSTRAP: "1"
          LLM_PROVIDER: test
          APP_DATA_BACKEND: postgres
          AUTH_STORE_BACKEND: postgres
          HOUSEHOLD_STORE_BACKEND: postgres
          EPHEMERAL_STATE_BACKEND: redis
          POSTGRES_DSN: postgresql://dietary_guardian:dietary_guardian@127.0.0.1:5432/dietary_guardian
          REDIS_URL: redis://127.0.0.1:6379/0
          WORKER_MODE: external
        run: uv run python scripts/dg.py smoke postgres-redis
