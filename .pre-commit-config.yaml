repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check
        language: system
        types: [python]
      - id: ty-check
        name: ty-check
        entry: uv run ty check --extra-search-path src --output-format concise
        language: system
        types: [python]
      - id: web-lint
        name: web-lint
        entry: pnpm web:lint
        language: system
        files: ^apps/web/
        pass_filenames: false
      - id: web-typecheck
        name: web-typecheck
        entry: pnpm web:typecheck
        language: system
        files: ^apps/web/
        pass_filenames: false
      - id: web-e2e
        name: web-e2e
        entry: pnpm web:e2e
        language: system
        files: ^apps/web/
        pass_filenames: false
        stages: [manual, pre-push]
