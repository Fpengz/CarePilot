repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: ty-check
        name: ty-check
        entry: uv run ty check . --extra-search-path src --output-format concise
        language: system
        pass_filenames: false
