repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: tools/precommit_ruff.sh
        language: system
        pass_filenames: false
        stages: [commit]
      - id: ty-check
        name: ty-check
        entry: tools/precommit_ty.sh
        language: system
        pass_filenames: false
        stages: [commit]
